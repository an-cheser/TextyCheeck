<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TextyCheeck — Сравнение текстов с подсветкой символов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', 'BlinkMacSystemFont', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            padding: 32px 24px;
            backdrop-filter: blur(2px);
        }

        /* Glassmorphism главный контейнер */
        .glass-panel {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        /* Заголовок */
        .hero {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b3c, #2c3e50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.01em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.02);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #4a5b6e;
            font-weight: 500;
            margin-top: 8px;
            opacity: 0.85;
        }

        /* Кнопки — стеклянные + ховеры */
        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 590;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #1f2e3a;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            letter-spacing: -0.2px;
        }

        button i {
            margin-right: 6px;
            font-style: normal;
            display: inline-block;
        }

        button:hover {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: #007aff;
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:hover {
            background: #005fc1;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(120, 120, 128, 0.18);
            backdrop-filter: blur(8px);
        }

        /* Два редактора */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .text-box {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
        }

        .text-box h3 {
            font-weight: 590;
            font-size: 1.3rem;
            color: #1c2c38;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        textarea {
            width: 100%;
            height: 360px;
            padding: 16px;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 24px;
            resize: vertical;
            transition: 0.2s;
            color: #1f2e3a;
        }

        textarea:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.2);
            background: white;
        }

        .file-label {
            background: rgba(100, 100, 110, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .file-label:hover {
            background: rgba(0, 122, 255, 0.2);
        }

        /* Результаты — прозрачный блок */
        .result-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }

        .diff-view {
            background: rgba(250, 250, 252, 0.7);
            border-radius: 28px;
            padding: 20px;
            max-height: 550px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.02), 0 1px 1px rgba(0,0,0,0.02);
        }

        /* Статус */
        .status {
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            font-weight: 500;
            backdrop-filter: blur(8px);
        }

        .status-same {
            background: rgba(52, 199, 89, 0.2);
            color: #1d6b2e;
            border: 1px solid rgba(52, 199, 89, 0.5);
        }

        .status-different {
            background: rgba(255, 69, 58, 0.15);
            color: #ac3b2b;
            border: 1px solid rgba(255, 69, 58, 0.4);
        }

        /* Стили диффа */
        .diff-line {
            padding: 12px 14px;
            margin-bottom: 12px;
            border-radius: 20px;
            transition: 0.1s;
        }

        .diff-same {
            background: rgba(255, 255, 255, 0.5);
            border-left: 4px solid #8e8e93;
        }

        .diff-removed {
            background: rgba(255, 69, 58, 0.15);
            border-left: 4px solid #ff3b30;
        }

        .diff-added {
            background: rgba(52, 199, 89, 0.18);
            border-left: 4px solid #34c759;
        }

        .diff-changed {
            background: rgba(255, 204, 0, 0.2);
            border-left: 4px solid #ffcc00;
        }

        /* Подсветка символов */
        .char-diff-removed {
            background-color: rgba(255, 59, 48, 0.35);
            text-decoration: line-through;
            border-radius: 8px;
            padding: 0px 3px;
            font-weight: 500;
        }

        .char-diff-added {
            background-color: rgba(52, 199, 89, 0.45);
            border-radius: 8px;
            padding: 0px 3px;
            font-weight: 500;
        }

        .inline-removed {
            background-color: rgba(255, 69, 58, 0.3);
            text-decoration: line-through;
            border-radius: 12px;
            padding: 2px 6px;
            display: inline-block;
        }

        .inline-added {
            background-color: rgba(52, 199, 89, 0.45);
            border-radius: 12px;
            padding: 2px 8px;
            display: inline-block;
        }

        /* Статистика в стиле карточек */
        .stats {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 16px 20px;
            flex: 1;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.6);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #007aff;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: #3a4a5c;
            margin-top: 6px;
        }

        /* Режимы */
        .mode-badge {
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
        }

        .view-toggle {
            background: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 30px;
        }

        /* Scrollbar */
        .diff-view::-webkit-scrollbar {
            width: 6px;
        }

        .diff-view::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .diff-view::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        @media (max-width: 780px) {
            .glass-panel {
                padding: 20px;
            }
            .editor-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
<div class="glass-panel">
    <div class="hero">
        <h1>📄 TextyCheeck</h1>
        <div class="subtitle">Сравнение строк, слов и символов с эффектом стекла</div>
    </div>

    <div class="controls">
        <button class="btn-primary" onclick="compareTexts()">✨ Сравнить тексты</button>
        <button class="btn-secondary" onclick="swapTexts()">🔄 Поменять</button>
        <button class="btn-secondary" onclick="clearAll()">🧹 Очистить</button>
        <button class="btn-secondary" onclick="loadExamples()">📋 Пример</button>
    </div>

    <div class="editor-container">
        <div class="text-box">
            <h3>📌 Оригинал <label class="file-label" for="file1">📂 Загрузить .txt</label></h3>
            <textarea id="text1" placeholder="Вставьте первый текст..."></textarea>
            <input type="file" id="file1" class="file-input" style="display:none" accept=".txt,.md,.csv" onchange="loadFile('text1', this)">
        </div>

        <div class="text-box">
            <h3>✏️ Новая версия <label class="file-label" for="file2">📂 Загрузить .txt</label></h3>
            <textarea id="text2" placeholder="Вставьте второй текст..."></textarea>
            <input type="file" id="file2" class="file-input" style="display:none" accept=".txt,.md,.csv" onchange="loadFile('text2', this)">
        </div>
    </div>

    <div class="result-glass" id="resultContainer" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
            <h3 style="font-weight: 590;">🔍 Детальный анализ</h3>
            <div style="display: flex; gap: 12px;">
                <span class="mode-badge" id="currentMode">режим: построчный</span>
            </div>
        </div>
        <div id="status" class="status"></div>
        <div class="controls" style="margin-bottom: 16px;">
            <button class="view-toggle" onclick="setViewMode('line')">📄 Построчно</button>
            <button class="view-toggle" onclick="setViewMode('char')">🔤 По символам</button>
            <button class="view-toggle" onclick="setViewMode('inline')">📝 Inline diff</button>
        </div>
        <div class="diff-view" id="diffView"></div>
        <div class="stats" id="stats"></div>
    </div>
</div>

<script>
    let currentViewMode = 'line';

    function loadFile(textareaId, inputElement) {
        const file = inputElement.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById(textareaId).value = e.target.result;
        };
        reader.readAsText(file, 'UTF-8');
    }

    function setViewMode(mode) {
        currentViewMode = mode;
        const modeMap = { line: 'режим: построчный', char: 'режим: символьный', inline: 'режим: inline' };
        document.getElementById('currentMode').innerText = modeMap[mode];
        compareTexts();
    }

    function compareTexts() {
        const text1 = document.getElementById('text1').value;
        const text2 = document.getElementById('text2').value;
        const container = document.getElementById('resultContainer');
        container.style.display = 'block';

        const statusDiv = document.getElementById('status');
        if (text1 === text2) {
            statusDiv.className = 'status status-same';
            statusDiv.innerHTML = '✅ Идеально — тексты совпадают';
        } else {
            statusDiv.className = 'status status-different';
            statusDiv.innerHTML = '⚠️ Тексты отличаются, детали ниже';
        }

        if (currentViewMode === 'line') showLineDiff(text1, text2);
        else if (currentViewMode === 'char') showCharDiff(text1, text2);
        else showInlineDiff(text1, text2);

        showStats(text1, text2);
    }

    function showLineDiff(t1, t2) {
        const lines1 = t1.split('\n'), lines2 = t2.split('\n');
        const maxLen = Math.max(lines1.length, lines2.length);
        const diffDiv = document.getElementById('diffView');
        diffDiv.innerHTML = '';
        for (let i = 0; i < maxLen; i++) {
            const l1 = i < lines1.length ? lines1[i] : '';
            const l2 = i < lines2.length ? lines2[i] : '';
            const lineDiv = document.createElement('div');
            lineDiv.className = 'diff-line';
            if (l1 === l2 && l1 !== '') {
                lineDiv.className += ' diff-same';
                lineDiv.innerHTML = `<div style="font-weight:500; margin-bottom:6px;">Стр ${i+1}</div><div>${escapeHtml(l1)}</div>`;
            } else if (l1 !== '' && l2 === '') {
                lineDiv.className += ' diff-removed';
                lineDiv.innerHTML = `<div style="font-weight:500;">❌ Только в первом (стр ${i+1})</div><div>${escapeHtml(l1)}</div>`;
            } else if (l1 === '' && l2 !== '') {
                lineDiv.className += ' diff-added';
                lineDiv.innerHTML = `<div style="font-weight:500;">✅ Только во втором (стр ${i+1})</div><div>${escapeHtml(l2)}</div>`;
            } else {
                lineDiv.className += ' diff-changed';
                lineDiv.innerHTML = `<div style="font-weight:500;">⚠️ Строка ${i+1} изменена</div>
                                    <div style="color:#c2410c;">➖ ${escapeHtml(l1)}</div>
                                    <div style="color:#2b825b;">➕ ${escapeHtml(l2)}</div>`;
            }
            diffDiv.appendChild(lineDiv);
        }
    }

    function getCharDifference(a, b) {
        let res1 = '', res2 = '';
        let i = 0, j = 0;
        while (i < a.length || j < b.length) {
            if (i < a.length && j < b.length && a[i] === b[j]) {
                res1 += `<span>${escapeHtml(a[i])}</span>`;
                res2 += `<span>${escapeHtml(b[j])}</span>`;
                i++; j++;
            } else if (i < a.length && (j >= b.length || a[i] !== b[j])) {
                res1 += `<span class="char-diff-removed">${escapeHtml(a[i])}</span>`;
                if (j < b.length) res2 += `<span class="char-diff-added">${escapeHtml(b[j])}</span>`;
                i++; if (j < b.length) j++;
            } else if (j < b.length) {
                res2 += `<span class="char-diff-added">${escapeHtml(b[j])}</span>`;
                j++;
            }
        }
        return { text1: res1, text2: res2 };
    }

    function showCharDiff(t1, t2) {
        const lines1 = t1.split('\n'), lines2 = t2.split('\n');
        const maxLen = Math.max(lines1.length, lines2.length);
        const diffDiv = document.getElementById('diffView');
        diffDiv.innerHTML = '';
        for (let i = 0; i < maxLen; i++) {
            const l1 = i < lines1.length ? lines1[i] : '';
            const l2 = i < lines2.length ? lines2[i] : '';
            const block = document.createElement('div');
            block.className = 'diff-line diff-changed';
            if (l1 === l2 && l1 !== '') {
                block.className = 'diff-line diff-same';
                block.innerHTML = `<div>${escapeHtml(l1)}</div>`;
            } else if (l1 === '' && l2 !== '') {
                block.className = 'diff-line diff-added';
                block.innerHTML = `<div>➕ ${escapeHtml(l2)}</div>`;
            } else if (l1 !== '' && l2 === '') {
                block.className = 'diff-line diff-removed';
                block.innerHTML = `<div>➖ ${escapeHtml(l1)}</div>`;
            } else {
                const diff = getCharDifference(l1, l2);
                block.innerHTML = `<div><strong>📄 строка ${i+1}</strong></div>
                                  <div style="margin-top:6px">${diff.text1}</div>
                                  <div style="margin-top:6px">${diff.text2}</div>`;
            }
            diffDiv.appendChild(block);
        }
    }

    function showInlineDiff(t1, t2) {
        const diffs = computeSmartDiff(t1, t2);
        const diffDiv = document.getElementById('diffView');
        diffDiv.innerHTML = '';
        const container = document.createElement('div');
        container.style.fontFamily = "'SF Mono', monospace";
        diffs.forEach(d => {
            const span = document.createElement('span');
            if (d.type === 'equal') span.innerHTML = escapeHtml(d.text);
            else if (d.type === 'delete') span.innerHTML = `<span class="inline-removed">${escapeHtml(d.text)}</span>`;
            else span.innerHTML = `<span class="inline-added">${escapeHtml(d.text)}</span>`;
            container.appendChild(span);
        });
        diffDiv.appendChild(container);
    }

    function computeSmartDiff(t1, t2) {
        const lines1 = t1.split('\n'), lines2 = t2.split('\n');
        const result = [];
        let i = 0, j = 0;
        while (i < lines1.length || j < lines2.length) {
            if (i < lines1.length && j < lines2.length && lines1[i] === lines2[j]) {
                result.push({ type: 'equal', text: lines1[i] + '\n' });
                i++; j++;
            } else if (i < lines1.length && j < lines2.length && isSimilar70(lines1[i], lines2[j])) {
                const cd = getCharDifference(lines1[i], lines2[j]);
                result.push({ type: 'delete', text: stripHtml(cd.text1) + '\n' });
                result.push({ type: 'insert', text: stripHtml(cd.text2) + '\n' });
                i++; j++;
            } else if (i < lines1.length) {
                result.push({ type: 'delete', text: lines1[i] + '\n' });
                i++;
            } else {
                result.push({ type: 'insert', text: lines2[j] + '\n' });
                j++;
            }
        }
        return result;
    }

    function isSimilar70(s1, s2) {
        let diff = 0;
        for (let k = 0; k < Math.min(s1.length, s2.length); k++) if (s1[k] !== s2[k]) diff++;
        diff += Math.abs(s1.length - s2.length);
        return diff / Math.max(s1.length, s2.length) < 0.5;
    }

    function stripHtml(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }

    function showStats(t1, t2) {
        const lines1 = t1.split('\n').filter(l=>l.trim()), lines2 = t2.split('\n').filter(l=>l.trim());
        const words1 = t1.split(/\s+/).filter(w=>w), words2 = t2.split(/\s+/).filter(w=>w);
        const chars1 = t1.replace(/\s/g,'').length, chars2 = t2.replace(/\s/g,'').length;
        let charDiffs = 0;
        for (let i=0; i<Math.min(t1.length, t2.length); i++) if(t1[i] !== t2[i]) charDiffs++;
        charDiffs += Math.abs(t1.length - t2.length);
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-value">${lines1.length} / ${lines2.length}</div><div class="stat-label">строки</div></div>
            <div class="stat-card"><div class="stat-value">${words1.length} / ${words2.length}</div><div class="stat-label">слова</div></div>
            <div class="stat-card"><div class="stat-value">${chars1} / ${chars2}</div><div class="stat-label">символы (без пробелов)</div></div>
            <div class="stat-card"><div class="stat-value">${charDiffs}</div><div class="stat-label">разных символов</div></div>
        `;
    }

    function clearAll() {
        document.getElementById('text1').value = '';
        document.getElementById('text2').value = '';
        document.getElementById('resultContainer').style.display = 'none';
    }

    function loadExamples() {
        document.getElementById('text1').value = `Вдохновение — это умение приводить себя в рабочее состояние.
Apple создаёт продукты, где технологии становятся прозрачными.
Качество деталей видно в мелочах.`;
        document.getElementById('text2').value = `Вдохновение — это способность приводить себя в рабочее состояние.
Apple создаёт устройства, где технологии становятся интуитивными.
Качество деталей ощущается в каждой кривой.`;
        compareTexts();
    }

    function swapTexts() {
        const t1 = document.getElementById('text1').value, t2 = document.getElementById('text2').value;
        document.getElementById('text1').value = t2;
        document.getElementById('text2').value = t1;
        if (t1 || t2) compareTexts();
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'Enter') compareTexts(); });
</script>
</body>
</html>
